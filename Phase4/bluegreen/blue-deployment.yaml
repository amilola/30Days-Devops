apiVersion: apps/v1
kind: Deployment
metadata:
  name: taskflow-blue
spec:
  replicas: 2
  selector:
    matchLabels:
      app: taskflow
      version: blue
  template:
    metadata:
      labels:
        app: taskflow
        version: blue
    spec:
      containers:
      - name: taskflow
        image: damioya/taskflow-api:latest
        ports:
        - containerPort: 8000