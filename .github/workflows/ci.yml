name: Taskflow API CI

# Run workflow on push or pull request to Phase3/taskflow-api folder
on:
  push:
    branches:
      - main
    paths:
      - "Phase3/taskflow-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "Phase3/taskflow-api/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    # All commands run inside Phase3/taskflow-api
    defaults:
      run:
        working-directory: Phase3/taskflow-api

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Step 4: Run lint check
      - name: Run lint
        run: |
          pip install flake8
          flake8 app

      # Step 5: Run tests
      - name: Run tests
        run: |
          pytest

# NEW STEP: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # NEW STEP: Extract commit SHA
      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # UPDATED: Build image with proper tags
      - name: Build Docker image
        run: |
          docker build \
            --cache-from=${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest \
            -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }} .

          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest

      # NEW STEP: Push image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }}  
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest  
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}    
      
      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy taskflow-api \
            --image=${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }} \
            --platform=managed \
            --region=us-central1 \
            --allow-unauthenticated \
            --min-instances=0

      - name: Get Cloud Run URL
        id: get_url
        run: |
          URL=$(gcloud run services describe taskflow-api \
            --region=us-central1 \
            --format='value(status.url)')
          echo "URL=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        id: health
        run: |
          if curl -f -H "x-fail-health: ${{ vars.FAIL_HEALTH }}" ${{ steps.get_url.outputs.URL }}/health; then
            echo "status=failure" >> $GITHUB_OUTPUT
          else
            echo "status=success" >> $GITHUB_OUTPUT
            exit 0
          fi

      - name: Rollback if failed
        if: steps.health.outputs.status == 'failure'
        run: |
          echo "Health check failed. Rolling back..."

          PREV=$(gcloud run revisions list \
            --service=taskflow-api \
            --region=us-central1 \
            --limit=2 \
            --format="value(metadata.name)" | tail -n 1)

          echo "Rolling back to: $PREV"

          gcloud run services update-traffic taskflow-api \
            --region=us-central1 \
            --to-revisions=$PREV=100