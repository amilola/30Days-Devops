name: Taskflow API CI

# Run workflow on push or pull request to Phase3/taskflow-api folder
on:
  push:
    paths:
      - "Phase3/taskflow-api/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "Phase3/taskflow-api/**"

jobs:
  build:
    runs-on: ubuntu-latest

    # All commands run inside Phase3/taskflow-api
    defaults:
      run:
        working-directory: Phase3/taskflow-api

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Step 3: Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Step 4: Run lint check
      - name: Run lint
        run: |
          pip install flake8
          flake8 app

      # Step 5: Run tests
      - name: Run tests
        run: |
          pytest

# NEW STEP: Login to Docker Hub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # NEW STEP: Extract commit SHA
      - name: Set image tag
        id: vars
        run: echo "TAG=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      # UPDATED: Build image with proper tags
      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }} .
          docker tag ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }} ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest

      # NEW STEP: Push image
      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ steps.vars.outputs.TAG }}  
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:latest  
      
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            docker pull damioya/taskflow-api:latest
            docker stop taskflow || true
            docker rm taskflow || true
            docker run -d -p 8000:8000 --name taskflow damioya/taskflow-api:latest
            
